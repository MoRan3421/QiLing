# Render 一键部署后端
# https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: qiling-brain
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: QILING_ADMIN_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: QILING_PRO_INVITE_CODE
        sync: false
    disk:
      name: qiling-data
      mountPath: /data
      sizeGB: 1
